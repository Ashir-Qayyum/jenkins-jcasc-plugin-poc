# MY CURRENT values.yaml

jenkins:      # All these values belongs to the dependency helm chart i.e. the official helm chart I included in the Chart.yaml
              # dependency section, so these values will be used as e.g. .Values.controller.admin.username directly by the 
              # jenkins dependency helm chart included

  controller:
    
    image:                    # I Added this section later when implementing CI/CD. Jenkins official image didn't include tools
      registry: docker.io     # like helm, kubectl, docker CLI etc. as i am not yet implementing jenkins k8s agent AND the pipeline 
                              # will be run inside the jenkins pod container. The image Dockerfile is in dir: jenkins-custom-image
      repository: ashirqayyum/custom-jenkins
      tag: "1.0"
    # additionalVolumes:      # This will mount my configMap containing jcasc files as a volume
    #   - name: jcasc-config
    #     configMap:
    #       name: jenkins-jcasc


    # additionalVolumeMounts:   # This will mount the vol location from where jenkins import jcasc config files
    #   - name: jcasc-config
    #     mountPath: /var/jenkins_home/casc_configs
    #     readOnly: true


    # env:        # This sets the env var inside jenkins pod container which is used by JCasC to load config files
    #   - name: CASC_JENKINS_CONFIG
    #     value: /var/jenkins_home/casc_configs


    admin:
      username: ashir
      password: ashir123    # Initial Password LATER I shall change it

    serviceType: NodePort   # As I am using MINIKUBE for kubernetes on docker driver on colima
    
    initializeOnce: false       # This is because  there's pvc. IF later we modify the plugins or jcasc files and upgrade helm,
                                # so the data inside pvc also get update again
    
    JCasC:
      enabled: true   # It enabled JCasC
      defaultConfig: false    # It disabled default config of JCasC

      securityRealm: ""             # THis is avoid clash between my securityREalm object & jenkins helm default one
      authorizationStrategy: ""

      sidecars:
        configAutoReload:
          enabled: true     # This will ensure the JCasC is configured auto



    installPlugins:       # Installing Plugins along with jenkins as supported in official jenkins helm chart

      - configuration-as-code
      - git
      - github

      - workflow-aggregator
      - workflow-job
      - workflow-cps
      - workflow-basic-steps

      - job-dsl

      - kubernetes

      - credentials
      - credentials-binding
      - plain-credentials
      - ssh-credentials

      - pipeline-stage-view
      - pipeline-github-lib

      - matrix-auth
      - role-strategy

      - dark-theme

#    sidecars:           # ADDING THIS SIDECAR TO IMPLEMENT DinD TO RUN THE PIPELINE AS DOCKER DAEMON WAS NEEDED
                        # THE ALTERNATIVE IS CONFIGURING AND USING JENKINS K8S AGENTS
    
    sidecars:
      additionalSidecarContainers:
        - name: dind
          image: docker:28-dind
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run
            - name: docker-data
              mountPath: /var/lib/docker
          env:
          - name: DOCKER_TLS_CERTDIR
            value: ""

    containerEnv:
      - name: DOCKER_HOST
        value: unix:///var/run/docker.sock


    containerSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: true

    podSecurityContextOverride:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
      fsGroup: 0



  persistence:
    enabled: true
    size: 8Gi

    volumes:
      - name: docker-socket
        emptyDir: {}

      - name: docker-data
        emptyDir: {}

    mounts:
      - name: docker-socket
        mountPath: /var/run

      - name: docker-data
        mountPath: /var/lib/docker



  agent:
    enabled: false